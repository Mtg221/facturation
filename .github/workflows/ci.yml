name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-type-check:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: '${{ matrix.package }}/package-lock.json'
      - run: npm ci
        working-directory: ${{ matrix.package }}
      - run: npm run lint
        working-directory: ${{ matrix.package }}
        if: matrix.package == 'backend'
      - run: npm run type-check
        working-directory: ${{ matrix.package }}
        if: matrix.package == 'backend'

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: facturation_test
        ports: ['5432:5432']
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5
    env:
      DATABASE_URL: postgresql://test_user:test_pass@localhost:5432/facturation_test
      REDIS_URL: redis://localhost:6379
      JWT_ACCESS_SECRET: test_access_secret_at_least_32_chars_long
      JWT_REFRESH_SECRET: test_refresh_secret_at_least_32_chars_long
      JWT_ACCESS_EXPIRATION: 15m
      JWT_REFRESH_EXPIRATION: 7d
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'backend/package-lock.json'
      - run: npm ci
        working-directory: backend
      - run: npx prisma migrate deploy
        working-directory: backend
      - run: npm run test:cov
        working-directory: backend
      - uses: codecov/codecov-action@v4
        if: always()
        with:
          directory: ./backend/coverage

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'
      - run: npm ci
        working-directory: frontend
      - run: npm run test -- --run --coverage
        working-directory: frontend

  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    needs: [lint-and-type-check]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build backend
        working-directory: backend
        run: |
          npm ci
          npx prisma generate
          npm run build
      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build
